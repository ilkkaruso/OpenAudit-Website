<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenAudit Philippines - Corruption Risk Map</title>
  <link rel="stylesheet" href="css/map.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
</head>
<body>
  <header>
    <h1>OpenAudit Philippines</h1>
  </header>

  <main id="map" role="img" aria-label="Philippines corruption risk choropleth map by region"></main>

  <footer>
    <p>Data: Commission on Audit (COA) 2016-2024</p>
  </footer>

  <script src="js/map.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof renderMap === 'function') {
        renderMap();
      }
    });
  </script>
</body>
</html>
